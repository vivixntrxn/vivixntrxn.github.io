<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pickleball Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="left-group">
                <img src="media-home/logo.png" alt="Pickleball Hub Logo" class="logo">

                <div class="title-group">
                    <h1>Pickleball Hub</h1>
                    <p class="tagline">Your beginner's guide</p>
                </div>
            </div>

            <button class="menu-toggle">
                <img src="media-home/bars-solid.png" alt="Menu Bar">
                <span class="menu-label">Menu</span>
            </button>
        </div>
    </header>

    <!-- Navigation -->
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gameplay-fundamentals.html">Gameplay Fundamentals</a></li>
            <li><a href="equipment.html">Equipment</a></li>
            <li><a href="places-to-play.html">Places to Play</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
    <h2>The Fastest Growing Sport in America</h2>
        <div class="stats">
            <div class="stat">
                <span class="number">24.3M</span>
                <span class="label">US Players</span>
            </div>

            <div class="stat">
                <span class="number">5.1K</span>
                <span class="label">Paddles</span>
            </div>

            <div class="stat">
                <span class="number">82.6K</span>
                <span class="label">Courts</span>
            </div>

            <div class="stat">
                <span class="number">100%</span>
                <span class="label">For Beginners</span>
            </div>
        </div>
    </section>
</body>

<!-- Javascript for Navigation -->
<script>
    const menuButton = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');
    menuButton.addEventListener('click', () => {
        navLinks.classList.toggle('open');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (event) => {
        if (!menuButton.contains(event.target) && !navLinks.contains(event.target)) {
            navLinks.classList.remove('open');
        }
    });

    // Highlight current page link
    const currentPage = window.location.pathname.split('/').pop();
    const navItems = document.querySelectorAll('.nav-links li a');
    navItems.forEach(item => {
        if (item.getAttribute('href') === currentPage) {
            item.classList.add('active');
        }
    });
</script>
